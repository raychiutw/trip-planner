<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>V2 — Button + Modal date picker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<style>
  body { background: var(--color-secondary); }
  .device-frame {
    width: 390px;
    min-height: 844px;
    margin: 0 auto;
    background: var(--color-background);
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    overflow: hidden;
    position: relative;
  }
  /* V2: button that opens modal */
  .tp-edit-shift-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: var(--color-background);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-foreground);
    cursor: pointer;
    font: inherit;
    margin-bottom: 12px;
    width: 100%;
    text-align: left;
  }
  .tp-edit-shift-btn:hover {
    background: var(--color-hover);
    border-color: var(--color-accent);
  }
  .tp-edit-shift-btn .icon {
    display: inline-grid; place-items: center;
    width: 32px; height: 32px;
    background: var(--color-accent-subtle);
    color: var(--color-accent-deep);
    border-radius: var(--radius-full);
    font-size: 16px;
    flex-shrink: 0;
  }
  .tp-edit-shift-btn-label {
    flex: 1; min-width: 0;
  }
  .tp-edit-shift-btn-label strong {
    display: block;
    font-size: var(--font-size-callout);
    font-weight: 700;
    color: var(--color-foreground);
  }
  .tp-edit-shift-btn-label span {
    font-size: var(--font-size-caption);
    color: var(--color-muted);
  }
  .tp-edit-shift-btn .chev {
    color: var(--color-muted);
    font-size: 14px;
  }

  /* Modal with date input + preview */
  .tp-shift-modal {
    width: min(360px, 100%);
    border-radius: var(--radius-xl);
    background: var(--color-background);
    padding: 20px;
    box-shadow: var(--shadow-lg);
  }
  .tp-shift-modal h2 {
    margin: 0 0 6px;
    font-size: var(--font-size-title3);
    font-weight: 700;
  }
  .tp-shift-modal p.sub {
    margin: 0 0 16px;
    font-size: var(--font-size-footnote);
    color: var(--color-muted);
  }
  .tp-shift-modal label {
    display: block;
    font-size: var(--font-size-caption);
    font-weight: 600;
    color: var(--color-foreground);
    margin-bottom: 6px;
  }
  .tp-shift-modal input[type=date] {
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--color-border);
    border-radius: var(--radius-md);
    font: inherit;
    font-size: var(--font-size-callout);
    font-weight: 600;
    color: var(--color-foreground);
    outline: none;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .tp-shift-modal input[type=date]:focus {
    border-color: var(--color-accent);
    box-shadow: 0 0 0 3px var(--color-accent-subtle);
  }
  .tp-shift-preview {
    margin: 16px 0;
    padding: 12px;
    background: var(--color-accent-subtle);
    border-radius: var(--radius-md);
    font-size: var(--font-size-footnote);
    color: var(--color-accent-deep);
  }
  .tp-shift-preview strong { font-weight: 700; }
</style>
</head>
<body>

<div class="device-frame">
  <div class="tp-edit-page-shell">
    <header class="tp-edit-titlebar">
      <button class="tp-edit-titlebar-back" aria-label="返回">←</button>
      <h1 class="tp-edit-titlebar-title">編輯行程</h1>
      <button class="tp-edit-titlebar-save" aria-label="儲存">✓</button>
    </header>

    <form class="tp-edit-page-form">
      <p class="tp-edit-page-sub">修改行程基本設定 + 目的地 + 行程天數。</p>

      <div class="tp-edit-section">
        <label class="tp-edit-section-label">目的地</label>
        <div class="tp-edit-dest-row">
          <span class="tp-edit-dest-handle">⇅</span>
          <span class="tp-edit-dest-num">1</span>
          <span class="tp-edit-dest-name">沖繩</span>
          <button class="tp-edit-dest-remove">✕</button>
        </div>
      </div>

      <div class="tp-edit-section">
        <label class="tp-edit-section-label">行程天數</label>
        <p class="tp-edit-section-helper" style="margin-bottom:12px;">
          5/1（五）– 5/5（二），共 5 天。
        </p>

        <!-- V2: Button that opens modal -->
        <button type="button" class="tp-edit-shift-btn" id="shift-btn">
          <span class="icon">📅</span>
          <span class="tp-edit-shift-btn-label">
            <strong>移動整個行程</strong>
            <span>設定 Day 1 起始日期，所有天平移</span>
          </span>
          <span class="chev">›</span>
        </button>

        <button class="tp-edit-day-add-card" style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; min-height: 56px; border: 1px dashed var(--color-accent); background: var(--color-accent-subtle); color: var(--color-accent-deep); border-radius: var(--radius-md); font: inherit; font-size: var(--font-size-callout); font-weight: 700; cursor: pointer;">
          <span style="display: inline-grid; place-items: center; width: 24px; height: 24px; background: var(--color-accent); color: var(--color-accent-foreground); border-radius: var(--radius-full); font-weight: 700;">+</span>
          <span>加一天</span>
        </button>

        <div class="tp-edit-days-list" style="margin-top: 8px;">
          <div class="tp-edit-day-row">
            <span class="tp-edit-day-num">1</span>
            <div class="tp-edit-day-content">
              <div class="tp-edit-day-date">5/1（五）</div>
              <div class="tp-edit-day-meta has-entries">7 個景點 · 33 km</div>
            </div>
            <button class="tp-edit-day-remove has-entries-warning">✕</button>
          </div>
          <div class="tp-edit-day-row">
            <span class="tp-edit-day-num">2</span>
            <div class="tp-edit-day-content">
              <div class="tp-edit-day-date">5/2（六）</div>
              <div class="tp-edit-day-meta has-entries">8 個景點 · 56 km</div>
            </div>
            <button class="tp-edit-day-remove has-entries-warning">✕</button>
          </div>
          <div class="tp-edit-day-row">
            <span class="tp-edit-day-num">3</span>
            <div class="tp-edit-day-content">
              <div class="tp-edit-day-date">5/3（日）</div>
              <div class="tp-edit-day-meta has-entries">9 個景點 · 78 km</div>
            </div>
            <button class="tp-edit-day-remove has-entries-warning">✕</button>
          </div>
          <div class="tp-edit-day-row">
            <span class="tp-edit-day-num">4</span>
            <div class="tp-edit-day-content">
              <div class="tp-edit-day-date">5/4（一）</div>
              <div class="tp-edit-day-meta has-entries">11 個景點 · 138 km</div>
            </div>
            <button class="tp-edit-day-remove has-entries-warning">✕</button>
          </div>
          <div class="tp-edit-day-row">
            <span class="tp-edit-day-num">5</span>
            <div class="tp-edit-day-content">
              <div class="tp-edit-day-date">5/5（二）</div>
              <div class="tp-edit-day-meta has-entries">11 個景點 · 126 km</div>
            </div>
            <button class="tp-edit-day-remove has-entries-warning">✕</button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- Modal -->
<div class="tp-confirm-backdrop" id="modal" style="display: none;">
  <div class="tp-shift-modal" role="dialog">
    <h2>移動整個行程</h2>
    <p class="sub">設定 Day 1 起始日期。所有天會跟著平移，景點時間不變。</p>
    <label for="new-date">Day 1 起始日期</label>
    <input type="date" id="new-date" value="2026-08-15">
    <div class="tp-shift-preview">
      <strong>5/1（五）– 5/5（二）</strong> → <strong>8/15（六）– 8/19（三）</strong>
    </div>
    <div class="tp-confirm-actions">
      <button class="tp-confirm-btn tp-confirm-btn-cancel" onclick="document.getElementById('modal').style.display='none'">取消</button>
      <button class="tp-confirm-btn tp-confirm-btn-danger" style="background: var(--color-accent); border-color: var(--color-accent);">確認平移</button>
    </div>
  </div>
</div>

<script>
  document.getElementById('shift-btn').addEventListener('click', () => {
    document.getElementById('modal').style.display = 'grid';
  });
</script>

</body>
</html>
