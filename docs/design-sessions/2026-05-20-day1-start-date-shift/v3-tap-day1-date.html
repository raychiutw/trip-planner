<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>V3 — Tap Day 1 date inline editable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<style>
  body { background: var(--color-secondary); }
  .device-frame {
    width: 390px;
    min-height: 844px;
    margin: 0 auto;
    background: var(--color-background);
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    overflow: hidden;
    position: relative;
  }
  /* V3: Day 1 date itself is tappable — opens inline popover */
  .tp-edit-day-row.is-day1-editable .tp-edit-day-date {
    color: var(--color-accent-deep);
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 3px;
    cursor: pointer;
  }
  .tp-edit-day-row.is-day1-editable::after {
    content: "✏︎";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: var(--color-accent-deep);
    opacity: 0.5;
    pointer-events: none;
  }
  .tp-edit-day-row {
    position: relative;
  }
  /* Hint badge above Day 1 */
  .tp-day1-edit-hint {
    margin-bottom: 6px;
    display: inline-block;
    padding: 4px 10px;
    background: var(--color-accent-subtle);
    color: var(--color-accent-deep);
    border-radius: var(--radius-full);
    font-size: var(--font-size-eyebrow);
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  /* Popover */
  .tp-day1-popover {
    position: absolute;
    background: var(--color-background);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-md);
    padding: 14px;
    z-index: 50;
    width: 280px;
  }
  .tp-day1-popover label {
    display: block;
    font-size: var(--font-size-caption);
    font-weight: 600;
    color: var(--color-muted);
    margin-bottom: 6px;
  }
  .tp-day1-popover input {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    font: inherit;
    font-size: var(--font-size-callout);
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .tp-day1-popover .preview {
    margin: 10px 0;
    padding: 8px;
    background: var(--color-accent-subtle);
    border-radius: 8px;
    font-size: var(--font-size-caption);
    color: var(--color-accent-deep);
    text-align: center;
  }
  .tp-day1-popover .actions {
    display: flex; gap: 6px;
  }
  .tp-day1-popover .actions button {
    flex: 1;
    padding: 8px;
    border-radius: var(--radius-full);
    border: 1px solid var(--color-border);
    background: var(--color-secondary);
    font: inherit;
    font-size: var(--font-size-footnote);
    font-weight: 600;
    cursor: pointer;
  }
  .tp-day1-popover .actions button.primary {
    background: var(--color-accent);
    color: var(--color-accent-foreground);
    border-color: var(--color-accent);
  }
</style>
</head>
<body>

<div class="device-frame">
  <div class="tp-edit-page-shell">
    <header class="tp-edit-titlebar">
      <button class="tp-edit-titlebar-back" aria-label="返回">←</button>
      <h1 class="tp-edit-titlebar-title">編輯行程</h1>
      <button class="tp-edit-titlebar-save" aria-label="儲存">✓</button>
    </header>

    <form class="tp-edit-page-form">
      <p class="tp-edit-page-sub">修改行程基本設定 + 目的地 + 行程天數。</p>

      <div class="tp-edit-section">
        <label class="tp-edit-section-label">目的地</label>
        <div class="tp-edit-dest-row">
          <span class="tp-edit-dest-handle">⇅</span>
          <span class="tp-edit-dest-num">1</span>
          <span class="tp-edit-dest-name">沖繩</span>
          <button class="tp-edit-dest-remove">✕</button>
        </div>
      </div>

      <div class="tp-edit-section">
        <label class="tp-edit-section-label">行程天數</label>
        <p class="tp-edit-section-helper" style="margin-bottom:12px;">
          5/1（五）– 5/5（二），共 5 天。<strong>點 Day 1 日期可整體平移行程</strong>。
        </p>

        <button class="tp-edit-day-add-card" style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; min-height: 56px; border: 1px dashed var(--color-accent); background: var(--color-accent-subtle); color: var(--color-accent-deep); border-radius: var(--radius-md); font: inherit; font-size: var(--font-size-callout); font-weight: 700; cursor: pointer; margin-bottom: 8px;">
          <span style="display: inline-grid; place-items: center; width: 24px; height: 24px; background: var(--color-accent); color: var(--color-accent-foreground); border-radius: var(--radius-full); font-weight: 700;">+</span>
          <span>加一天</span>
        </button>

        <div class="tp-edit-days-list" style="position: relative;">
          <div class="tp-edit-day-row is-day1-editable" id="day1-row" style="z-index: 2;">
            <span class="tp-edit-day-num">1</span>
            <div class="tp-edit-day-content">
              <div class="tp-edit-day-date" id="day1-date">5/1（五）<span style="font-size: 11px; color: var(--color-muted); margin-left: 6px;">✏ 可修改</span></div>
              <div class="tp-edit-day-meta has-entries">7 個景點 · 33 km</div>
            </div>
            <button class="tp-edit-day-remove has-entries-warning">✕</button>
          </div>

          <!-- Popover overlay -->
          <div class="tp-day1-popover" id="popover" style="display:none; top: 60px; left: 12px;">
            <label>Day 1 新起始日期</label>
            <input type="date" id="popover-date" value="2026-08-15">
            <div class="preview">→ 整體平移到 8/15（六）– 8/19（三）</div>
            <div class="actions">
              <button onclick="document.getElementById('popover').style.display='none'">取消</button>
              <button class="primary">確認平移</button>
            </div>
          </div>

          <div class="tp-edit-day-row"><span class="tp-edit-day-num">2</span><div class="tp-edit-day-content"><div class="tp-edit-day-date">5/2（六）</div><div class="tp-edit-day-meta has-entries">8 個景點 · 56 km</div></div><button class="tp-edit-day-remove has-entries-warning">✕</button></div>
          <div class="tp-edit-day-row"><span class="tp-edit-day-num">3</span><div class="tp-edit-day-content"><div class="tp-edit-day-date">5/3（日）</div><div class="tp-edit-day-meta has-entries">9 個景點 · 78 km</div></div><button class="tp-edit-day-remove has-entries-warning">✕</button></div>
          <div class="tp-edit-day-row"><span class="tp-edit-day-num">4</span><div class="tp-edit-day-content"><div class="tp-edit-day-date">5/4（一）</div><div class="tp-edit-day-meta has-entries">11 個景點 · 138 km</div></div><button class="tp-edit-day-remove has-entries-warning">✕</button></div>
          <div class="tp-edit-day-row"><span class="tp-edit-day-num">5</span><div class="tp-edit-day-content"><div class="tp-edit-day-date">5/5（二）</div><div class="tp-edit-day-meta has-entries">11 個景點 · 126 km</div></div><button class="tp-edit-day-remove has-entries-warning">✕</button></div>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
  document.getElementById('day1-row').addEventListener('click', () => {
    document.getElementById('popover').style.display = 'block';
  });
</script>

</body>
</html>
