<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src 'self' https://api.open-meteo.com https://api.github.com; img-src 'self' https: data:;">
    <meta name="description" content="旅遊行程規劃：每日景點、餐廳推薦、地圖導航、天氣預報、預算規劃，一頁搞定。">
    <meta name="theme-color" content="#C4704F">
    <meta property="og:title" content="Trip Planner">
    <meta property="og:description" content="旅遊行程規劃：每日景點、餐廳推薦、地圖導航、天氣預報、預算規劃，一頁搞定。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://trip-planner-dby.pages.dev/">
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="images/favicon-32x32.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <title>Trip Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.open-meteo.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-layout">
        <div class="container">
            <div class="sticky-nav" id="stickyNav">
                <span class="nav-brand">Trip Planner</span>
                <div class="dh-nav-wrap" id="navWrap">
                    <button class="dh-nav-arrow" id="navArrowL" aria-label="向左捲動" aria-hidden="true">&#8249;</button>
                    <div class="dh-nav" id="navPills"></div>
                    <button class="dh-nav-arrow" id="navArrowR" aria-label="向右捲動" aria-hidden="true">&#8250;</button>
                </div>
                <div class="nav-actions">
                    <button class="nav-action-btn" data-action="toggle-print" aria-label="列印模式"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg><span class="nav-action-label">列印模式</span></button>
                    <a class="nav-action-btn" href="setting.html" aria-label="設定"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/></svg><span class="nav-action-label">設定</span></a>
                </div>
            </div>
            <div id="tripContent"><div style="text-align:center;padding:40px;color:var(--gray);"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20" style="vertical-align:-4px"><path d="M6 2v6h.01L6 8.01 10 12l-4 4 .01.01H6V22h12v-5.99h-.01L18 16l-4-4 4-3.99-.01-.01H18V2H6z"/></svg> 載入行程資料中...</div></div>
        </div>
        <aside class="info-panel" id="infoPanel"></aside>
    </div>
    <button class="print-exit-btn" id="printExitBtn" data-action="toggle-print"><svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16" style="vertical-align:-2px"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg> 結束列印模式</button>
    <div class="speed-dial" id="speedDial">
        <div class="speed-dial-backdrop" id="speedDialBackdrop"></div>
        <div class="speed-dial-items" id="speedDialItems">
            <button class="speed-dial-item" data-action="speed-dial-item" data-content="suggestions" aria-label="AI 行程建議"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/></svg></button>
            <button class="speed-dial-item" data-action="speed-dial-item" data-content="emergency" aria-label="緊急聯絡"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></button>
            <button class="speed-dial-item" data-action="speed-dial-item" data-content="backup" aria-label="備案"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 0 0 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg></button>
            <button class="speed-dial-item" data-action="speed-dial-item" data-content="checklist" aria-label="出發前確認"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></button>
            <button class="speed-dial-item" data-action="speed-dial-item" data-content="flights" aria-label="航班資訊"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M21 16v-2l-8-5V3.5C13 2.67 12.33 2 11.5 2S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg></button>
        </div>
        <button class="speed-dial-trigger" id="speedDialTrigger" aria-label="快速選單"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M12 8l-6 6h12z"/></svg></button>
    </div>
    <a href="edit.html" class="edit-fab" id="editFab" aria-label="AI 修改行程"><svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></a>
    <div class="info-sheet-backdrop" id="infoBottomSheet">
        <div class="info-sheet-panel" id="infoSheet">
            <div class="sheet-handle"></div>
            <div class="info-sheet-body" id="bottomSheetBody"></div>
        </div>
    </div>
    <script src="js/shared.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
