schema: spec-driven

env:
  # ⚠️ 所有 key/token/secret 已移至 .env.local（不進版控）
  # 本檔案只保留非敏感的名稱/ID 參考
  D1_DATABASE_NAME: trip-planner-db
  D1_STAGING_DATABASE_NAME: trip-planner-db-staging
  # --- 敏感值位置 ---
  # CF_ACCOUNT_ID / D1_DATABASE_ID / CLOUDFLARE_API_TOKEN: → .env.local
  # CF_ACCESS_CLIENT_ID / CF_ACCESS_CLIENT_SECRET: → .env.local
  # SENTRY_ORG / SENTRY_PROJECT / SENTRY_AUTH_TOKEN / VITE_SENTRY_DSN: → .env.local
  # TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID: → .env.local
  # DEV_MOCK_EMAIL / ADMIN_EMAIL: → .env.local
  # --- Pages 環境變數（Cloudflare Dashboard）---
  # CF_API_TOKEN, CF_ACCESS_APP_ID, CF_ACCESS_POLICY_ID, ADMIN_EMAIL

context: |
  行程共享網站（Tripline），部署於 Cloudflare Pages + D1
  Tech stack: React 19 SPA + TypeScript strict + Vite 8 + Tailwind CSS 4
  測試: Vitest + Playwright，CI: GitHub Actions（tsc + test + test:api + build + verify-sw）
  語言：繁體中文台灣用語，commit 訊息繁體中文
  Git：commit 後不自動 push；文件變更不跑測試
  監控：Sentry（@sentry/react），每日健康檢查（daily-report.js + Telegram 異常通知）
  設計：DESIGN.md（暖色有機風、Apple HIG、6 套主題、tokens.css）
  本機開發：npm run dev（vite + wrangler pages dev + mock auth + 本機 SQLite）
  資料架構：POI Schema V2（pois + trip_pois + poi_relations，零 JSON 欄位）
  錯誤處理：ErrorCode enum + AppError（後端 throw）+ ApiError（前端 parse）+ Toast + Sentry

# ============================================================
# 系統架構 — Production / Staging / Dev
# ============================================================
architecture:
  environments:
    production:
      url: https://trip-planner-dby.pages.dev
      d1_database: trip-planner-db
      deploy: master push → Cloudflare Pages 自動部署
      auth: Cloudflare Access（Zero Trust）
      monitoring:
        - Sentry（SYS_* 自動上報）
        - daily-report.js（GitHub Actions UTC 22:23 = 台灣 06:23）
        - Telegram 異常通知（TELEGRAM_BOT_TOKEN in GitHub Secrets）
    staging:
      url: PR Preview Deploy（自動）
      d1_database: trip-planner-db-staging
      deploy: PR push → Cloudflare Pages Preview
      auth: Cloudflare Access（preview 環境）
      config: wrangler.toml [env.preview]
    dev:
      url: http://localhost:5173（Vite）+ http://localhost:8788（API）
      d1_database: 本機 SQLite（.wrangler/state/）
      deploy: npm run dev（concurrently vite + wrangler pages dev）
      auth: DEV_MOCK_EMAIL（.env.local）→ 免 Cloudflare Access
      init: npm run dev:init（初始化本機 D1 schema）

  d1_migration_流程:
    順序: "dev → staging → production（三環境都要跑）"
    指令:
      dev: "npx wrangler d1 execute trip-planner-db --file=migrations/XXXX.sql --local"
      staging: "npx wrangler d1 execute trip-planner-db-staging --file=migrations/XXXX.sql --remote"
      production: "npx wrangler d1 execute trip-planner-db --file=migrations/XXXX.sql --remote"
    前置: "node scripts/dump-d1.js（備份 production）"

  error_handling:
    後端:
      pattern: "throw new AppError('ERROR_CODE', 'detail') — middleware catch 轉 JSON Response"
      codes: "16 碼：NET_(2) + AUTH_(3) + PERM_(3) + DATA_(5) + SYS_(3)"
      定義: "src/types/api.ts（ErrorCode enum + ERROR_MESSAGES，前後端共用）"
      實作: "functions/api/_errors.ts（AppError class + errorResponse helper）"
    前端:
      pattern: "apiFetch throw ApiError — 支援新舊格式 sniff + severity 自動分類"
      UI: "Toast（堆疊 + 自動消失）+ ErrorPlaceholder（原位提示 + ReportButton）"
      Sentry: "SYS_* 自動上報 + errorCode tag"
      離線: "savePendingReport → localStorage → flushPendingReports（上線自動送）"
    公開端點: "POST /api/reports（蜜罐 + 30s rate limit，不需認證）"

  notifications:
    telegram:
      bot: tripline_home_bot（TELEGRAM_BOT_HOME_TOKEN）
      chat_id: TELEGRAM_CHAT_ID
      觸發: daily-report 偵測到資料異常時自動發送
      異常類型:
        - 空行程（有 trip 但 0 天）
        - 孤立 trip_pois（poi 不存在）
        - 使用者錯誤回報（24h 統計）
        - POI 缺 google_rating 超過 30%

# ============================================================
# 開發規範 + Commit Gate
# ============================================================
# ⚠️ 以下規則在開發過程中就必須遵從，commit_gate 是最後防線。
commit_gate:
  required_skill: tp-code-verify
  commands:
    - npx tsc --noEmit              # TypeScript 零錯誤
    - npm test                      # naming-convention + css-hig + unit + integration
  checks:
    - naming                        # 命名規範（JS/CSS/HTML/API/mapRow）
    - css-hig                       # CSS HIG 12 條（H1-H12）
    - coding-standards              # 觸控目標 44px、inline SVG、無框線、border-radius token
    - react-best-practices          # RBP-1~14（waterfall/re-render/rendering/bundle/JS 效能）
    - code-review-rules             # CR-1~10（hook 協調/cancelled guard/apiFetch/type safety）
  on_failure: 持續修改直到全部綠燈

# ============================================================
# tp-* Skills（行程資料操作，不走 code pipeline）
# ============================================================
skills:
  tp-check: 行程品質規則驗證（R0-R18）
  tp-create: 從零產生完整行程
  tp-edit: 自然語言部分修改行程
  tp-rebuild: 全面稽核修復單一行程
  tp-request: 處理旅伴請求
  tp-patch: 批次補齊缺失欄位

# ============================================================
# D1 安全規則
# ============================================================
d1_safety:
  migration:
    - "禁止 DROP TABLE 有被 FK ON DELETE CASCADE 引用的表"
    - "migration 執行前必須先備份：node scripts/dump-d1.js"
    - "staging 和 production 是不同 D1 — wrangler.toml [env.preview] 指向 staging"
  backup:
    - "手動備份：node scripts/dump-d1.js → backups/{timestamp}/"
    - "備份檔納入版控，確保可追溯"
    - "D1 Time Travel 可回溯 30 天"
  restore:
    - "優先用 D1 Time Travel 還原"
    - "次選從 backups/ 的 JSON 重建"

# ============================================================
# 設計規範
# ============================================================
rules:
  proposal:
    - 提案用繁體中文撰寫
    - 說明影響的檔案範圍
  design:
    - "所有視覺決定參照 DESIGN.md — 字型、色彩、間距、動效"
    - "UI 符合無框線設計（背景色差 + 間距 + 圓角 + box-shadow）"
    - "icon 用 inline SVG，不用 emoji 或 icon font"
    - "font-size 僅允許 Apple HIG text style token（tokens.css @theme 定義的 10 級）"
    - "spacing 4pt grid、border-radius 5 級 token（xs/sm/md/lg/full）"
    - "transition duration 僅允許 fast(150ms) / normal(250ms) / slow(350ms)"
    - "觸控目標最小 44x44px"
    - "色彩對比度 WCAG AA 4.5:1"
  tasks:
    - 每個 task 可獨立測試驗證
    - render 函式變更含 unit test 更新
    - 互動行為變更含 E2E test 更新

# ============================================================
# 測試體系
# ============================================================
testing:
  responsibilities:
    engineer:
      - "Unit / Integration test（TDD）"
      - "/simplify（code reuse + quality + efficiency）"
      - "/browse 實際操作確認功能"
    qa:
      - "/qa（互動測試 + bug 修復循環）"
      - "/benchmark（LCP / CLS / bundle size 回歸偵測）"
    designer:
      - "/design-review（視覺稽核 + CSS 修復）"
    security:
      - "/cso（OWASP + STRIDE + CVE + secret 掃描）"
    reviewer:
      - "/review（Claude diff 分析）"
      - "/codex（OpenAI 獨立 review）"
    devops:
      - "/canary（部署後監控）"

  layers:
    layer_1_self_review:
      who: Engineer
      when: 實作完每個 feature 後
      tools: ["/simplify", "unit test — tsc + npm test"]
    layer_2_formal_review:
      who: Reviewer + Security（並行）
      when: features done 後
      tools: ["/review", "/codex", "/cso"]
    layer_3_e2e:
      who: QA（與 Layer 2 並行）
      tools: ["/qa", "/browse", "/benchmark"]
    post_deploy:
      who: DevOps
      when: merge PR 後
      tools: ["/canary"]

  ci_auto:
    - "npx tsc --noEmit"
    - "npx tsc --noEmit -p tsconfig.functions.json"
    - "npm test（unit + integration + naming + css-hig）"
    - "npm run test:api（Miniflare D1 integration — 全 16 handler）"
    - "npm run build"
    - "node scripts/verify-sw.js"

  api_tests:
    runner: "vitest --config vitest.config.api.mts"
    infra: "Miniflare programmatic API（D1 singleton + migration seeding）"
    coverage: "19 files, 153 tests — 純函式 + integration（全 16 handler + reports）"
    helpers: "tests/api/helpers.ts — mockEnv, mockAuth, mockContext, callHandler, seedTrip"
    注意: "@cloudflare/vitest-pool-workers 有 node:os bug（#9719），不可用"

  qa_test_cases:
    navigation:
      - "Day Nav 切換 + 全覽模式"
      - "StickyNav 捲動固定"
      - "行程選擇器切換"
    panels:
      - "QuickPanel / InfoSheet 開關 + Escape 關閉 + backdrop 關閉"
      - "航班 / 清單 / 備案 / 緊急 / 建議 / 路線 面板內容完整"
    timeline:
      - "飯店 / 交通 / 地圖 展開收合"
      - "時間軸項目順序 + 時間顯示正確"
      - "餐廳 / 購物 POI 資訊完整"
    responsive:
      - "Desktop 1280px — 側欄 + 主內容"
      - "Mobile 375px — 單欄 + FAB + bottom sheet"
      - "Tablet 768px — 不破版"
    theme:
      - "淺色 / 深色 / 自動 切換"
      - "6 主題（sun/sky/zen/forest/sakura/night）套用正確"
    export:
      - "PDF / MD / JSON / CSV 下載"
      - "列印模式排版"
    errors:
      - "Console 無 JS 錯誤"
      - "Network 無 4xx/5xx"
      - "空行程 / 無資料 fallback"
