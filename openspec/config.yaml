context: |
  行程規劃網站（trip-planner），部署於 Cloudflare Pages
  Tech stack: 原生 HTML/CSS/JS（無框架），Vitest + jsdom 單元測試，Playwright E2E 測試
  四頁式架構：index.html（行程主頁）、manage/（旅伴請求）、admin/（權限管理）、setting.html（設定）
  資料層：Cloudflare D1 結構化 table → Pages Functions API → 前端即時讀取（不需 build）
  語言：繁體中文台灣用語，commit 訊息繁體中文
  UI 規範：無框線設計、卡片統一、全站 inline SVG（Material Symbols Rounded）
  字型規範：全站 11 級 Apple text style token — --fs-large-title(2.125rem) / --fs-title(1.75rem) / --fs-title2(1.375rem) / --fs-title3(1.25rem) / --fs-headline(1.0625rem) / --fs-body(1.0625rem body預設) / --fs-callout(1rem) / --fs-subheadline(0.9375rem) / --fs-footnote(0.8125rem) / --fs-caption(0.75rem) / --fs-caption2(0.6875rem)，禁用硬編碼 font-size
  Git：commit 後不自動 push，由使用者手動觸發
  測試：commit 前必須通過（pre-commit hook 自動執行），文件變更不跑測試
  Coding：commit 前必須跑 /tp-code-verify 驗證命名規範綠燈，紅燈則持續修改直到通過

naming: # 完整規範見 .claude/skills/references/naming-rules.md
  js:
    functions: camelCase              # renderHotel, mapApiDay, fetchDay
    local_variables: camelCase        # tripId, currentConfig, dayCache
    true_constants: UPPER_SNAKE_CASE  # DRIVING_WARN_MINUTES, TRANSPORT_TYPES
    mutable_state: camelCase          # 不得用 UPPER_CASE（TRIP → trip, CURRENT_TRIP_ID → currentTripId）
    module_exports: camelCase         # 與函式名一致
  css:
    classes: kebab-case               # day-header, tl-event, admin-section
    custom_properties: --kebab-case   # --fs-body, --radius-md, --accent
  html:
    element_ids: camelCase            # stickyNav, tripContent, navPills
    dynamic_ids: kebab-case           # day-slot-1, hourly-3（JS 產生）
    data_attributes: kebab-case       # data-trip-id, data-day, data-action
  api:
    db_columns: snake_case            # trip_id, day_num, travel_type
    api_response: snake_case          # 直接回傳 DB row，不做 camelCase 轉換
    trip_identifier: tripId           # API 統一回傳 tripId（非 id），包含 /api/trips 列表
  db_to_js_mapping:
    description: 使用 mapRow() 統一轉換，不散寫 if(x) y = x
    renames:
      - body → description
      - rating → googleRating
      - must_buy → mustBuy
      - reservation_url → reservationUrl
      - "travel: {desc} → travel: {text}"
      - day_of_week → dayOfWeek
      - self_drive → selfDrive
      - og_description → ogDescription
      - auto_scroll → autoScrollDates（逗號分隔字串 → array）
      - footer_json → footer（JSON string → object）
      - weather_json → weather（JSON string → object）
      - parking_json → parking（JSON string → object）

rules:
  proposal:
    - 提案用繁體中文撰寫
    - 說明影響的檔案範圍（哪些 js/css/html/json）
    - 若涉及 JSON 結構變更，需列出對 checklist/backup/suggestions 的連動影響
  design:
    - UI 變更需符合無框線設計規範（背景色差、間距、圓角、box-shadow）
    - 新增 icon 走 js/icons.js 的 ICONS registry，不用 emoji
    - CSS/JS 拆分遵循既有架構（shared/menu/style/edit/setting）
    - font-size 僅允許 11 級 Apple text style token（--fs-large-title 至 --fs-caption2），禁止硬編碼 px/rem/em
    - transition duration 僅允許 var(--duration-fast/normal/slow)，禁止硬編碼秒數
    - spacing 值須為 4pt grid（4 的倍數），裝飾元素除外
    - 互動元素須達 44px 最小觸控目標（var(--tap-min)）
    - border-radius 僅允許 5 級 token（--radius-xs/sm/md/lg/full），50% 圓形與非對稱值除外
    - focus-visible 移除 outline 時必須搭配 box-shadow: var(--shadow-ring)；表單輸入用文字游標不需 box-shadow
    - overlay/backdrop 背景使用 var(--overlay) token，不得硬寫 rgba(0,0,0,...)
    - sticky-nav 背景使用 color-mix frosted glass 效果，不得用實色 var(--bg)
    - dark mode 覆寫：若 base 已用 var(--token)、token 在 body.dark 有覆寫值，不需額外寫 body.dark .class 規則
    - color: #fff 改用 var(--text-on-accent)；color mode preview 用 var(--cmp-*) token
    - CSS HIG 變更須通過 tests/unit/css-hig.test.js 12 條回歸測試
  tasks:
    - 每個 task 應可獨立測試驗證
    - 涉及 render 函式的 task 需包含對應 unit test 更新
    - 涉及互動行為的 task 需包含對應 E2E test 更新
