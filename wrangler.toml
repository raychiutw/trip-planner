name = "trip-planner"
compatibility_date = "2024-12-01"
# nodejs_compat：V2 OAuth spike（oidc-provider 依賴 koa / node:crypto 等 Node shim）
# 若 spike 結論是 fallback 到 openauthjs + KV，應移除此 flag
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# v2.33.89 fix: CF Pages wrangler.toml 慣例 — 頂層 `[[d1_databases]]` 套用 preview，
# production 須走 `[[env.production.d1_databases]]` 才 inject。之前頂層 binding +
# 沒有 env.production override → prod context.env.DB undefined → 所有 /api/oauth/*
# /api/my-trips TypeError 500（Pbkdf2 / DB.prepare）。多週時間 prod login 全壞。
[[env.production.d1_databases]]
binding = "DB"
database_name = "trip-planner-db"
database_id = "d61c42d5-8083-4e18-9b6c-70e133e37322"

# v2.33.60 round 14: 明示 prod env vars，避免 DEV_MOCK_EMAIL 失誤生效。
# _middleware.ts:241-247 dev mock auth 守衛靠 envBag.ENVIRONMENT === 'production'
# 判斷拒。若 CF dashboard 沒設此 var，guard fail-open → DEV_MOCK_EMAIL 在 prod 生效
# = 完全 auth bypass。改在 wrangler.toml 強制聲明而非靠 CF dashboard 慣例。
# 部署提醒：CF Pages prod 部署仍需 wrangler env set 同步 PUBLIC_ORIGIN 等 var。
[env.production.vars]
ENVIRONMENT = "production"

# Preview environment — Preview Deploy 使用（Pages 只支援 preview/production）
[env.preview]
[env.preview.vars]
ENVIRONMENT = "preview"
[[env.preview.d1_databases]]
binding = "DB"
database_name = "trip-planner-db-staging"
database_id = "53f38e2c-e17d-4961-ba9e-f61e63477ecc"
