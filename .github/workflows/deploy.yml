name: Deploy — D1 migrations

# Closes the race window where Cloudflare Pages deploys new Worker code
# before a schema migration has been applied to production D1.
#
# Before this workflow: migrations were applied manually (`wrangler d1
# migrations apply --remote`). Any schema-dependent PR landed with a gap
# where new middleware referenced columns that didn't exist yet — INSERTs
# would silently fail inside `context.waitUntil()` until a human ran the
# migration.
#
# After this workflow: every master push kicks off the migration in
# parallel with CF Pages build. Migration finishes in ~10-30s, CF Pages
# build typically takes 60-120s, so the migration lands first in the
# common case. Not a hard serial guarantee (CF Pages is triggered by the
# same push event independently), but narrows the race window from
# "until a human notices" to "≤30s best-effort".
#
# Idempotency: `wrangler d1 migrations apply` tracks applied migrations
# in the d1_migrations table. No-op case (nothing pending) runs in ~3s.
#
# Migration author contract: D1 does NOT wrap multi-statement migrations
# in cross-statement transactions. If a migration is killed mid-sequence
# (timeout, SIGKILL), the DB is left half-applied. Migrations MUST be
# idempotent (use IF NOT EXISTS / IF EXISTS) so re-running is safe.

# v2.33.66 round 16 HIGH-1: minimal default permissions; wrangler 用 secrets.* 不
# 需 GITHUB_TOKEN write 權限。Telegram notifier 同理。
permissions:
  contents: read

on:
  push:
    branches: [master]
    # Only run when migration files or this workflow itself changed.
    # Other pushes (code-only, docs-only) are no-ops anyway; skipping
    # avoids wasted CI minutes and keeps the GitHub UI less noisy.
    paths:
      - 'migrations/**'
      - '.github/workflows/deploy.yml'

  # Manual trigger for ad-hoc re-runs (e.g. rerun after a failure)。
  # 不需要任何 input：gate 問的是 d1_migrations，dispatch 與 push 走完全同一條判定。
  workflow_dispatch:

# Prevent concurrent migration runs from racing the d1_migrations tracking
# table. cancel-in-progress: false means "queue the next run", do NOT kill
# an in-flight migration mid-sequence (would leave D1 half-applied).
concurrency:
  group: d1-migrations-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply pending D1 migrations (production)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # v2.33.66 round 16 LOW-1: pin SHA per OpenSSF
      # 不需要 fetch-depth：gate 已不看 git 歷史，改問 d1_migrations 哪些還沒套用。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 「哪些 migration 是新的」的權威來源是 D1，不是 git。git-based 推測（不論是
      # origin/master~1 還是 github.event.before）實測有三條洗白路徑：被 exit 1 擋下的
      # migration 只要之後有 commit 動到 migrations/ 就降級成 pre-existing；git mv 換
      # 編號也會；一次推多個 commit 也會。d1_migrations 不在乎 git 怎麼動 —— 沒套用過
      # 就是要檢查，擋下來的會一直被擋。
      - name: Compute pending migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute trip-planner-db --remote --env production --json \
            --command "SELECT name FROM d1_migrations" \
            | node scripts/d1-pending-migrations.js migrations > pending.txt
          echo "pending:"; cat pending.txt

      # 2026-05-04 incident gate: scan for D1 cascade-wipe risk patterns in pending
      # migrations (DROP TABLE on cascade-parent without backup-restore).
      # See scripts/check-migration-safety.sh for the rule + post-incident note.
      # exit 1 = unsafe pending migration; exit 2 = the gate itself couldn't run
      # (pending list missing / nothing to scan). Both block the apply step below.
      - name: D1 migration safety check
        run: bash scripts/check-migration-safety.sh --pending=pending.txt

      - name: Apply pending migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        # --env production is REQUIRED: since v2.33.89 (#778) the prod D1 binding
        # lives ONLY under [[env.production.d1_databases]] in wrangler.toml (top-level
        # has no binding — it would resolve to preview). Without --env production
        # wrangler errors "Couldn't find a D1 DB ... 'trip-planner-db'" and every
        # migration deploy fails (silently broke 2026-05-25 → 2026-05-30).
        run: npx wrangler d1 migrations apply trip-planner-db --remote --env production

      # Fail-loud: the whole point of this workflow is closing a race
      # window. A silent failure defeats the purpose. Telegram alert so
      # you see it within seconds instead of the next daily-check run.
      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"🚨 D1 migration workflow FAILED on master\\nCommit: ${SHORT_SHA}\\nRun: ${RUN_URL}\"}" \
            || true
