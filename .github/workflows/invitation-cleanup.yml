name: Cleanup — trip_invitations

# Daily cleanup of 30-day-old expired/accepted invitations (migration 0040 註解
# 承諾「post-V2 cleanup cron 砍 30 天前 expired/accepted rows」)。
#
# Cloudflare Pages Functions 不原生支援 `functions/_scheduled.ts` cron handler，
# 沿 `rate-limit-cleanup.yml` pattern：GitHub Actions schedule + `wrangler d1
# execute --remote`，免新增 Workers code。
#
# Idempotent: DELETE WHERE 過期 row → 重跑 0 effect。
# Cutoff: 30 天 — accepted rows 保留 audit trail，pending 仍未過期 rows 保留。
# SQL 細節見 scripts/cleanup-invitations.sql。

permissions:
  contents: read

on:
  schedule:
    # 每天 03:00 UTC（≈ 台北 11:00 早上，避開深夜 deploy peak）。
    - cron: '0 3 * * *'

  # Manual trigger for ad-hoc / first-deploy verify。
  workflow_dispatch:

# 防同時兩個 cron run 競爭（DELETE 是單 statement、無 mid-state 風險，
# 但 belt-and-suspenders 比照 deploy.yml）。
concurrency:
  group: d1-invitation-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: Delete 30-day-old expired/accepted invitations
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Delete expired/accepted rows
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler d1 execute trip-planner-db --remote --file=scripts/cleanup-invitations.sql

      # Fail-loud：與 deploy.yml / rate-limit-cleanup.yml 一致。
      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"🚨 trip_invitations cleanup cron FAILED\\nRun: ${RUN_URL}\"}" \
            || true
