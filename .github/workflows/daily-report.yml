name: Daily Report
on:
  schedule:
    - cron: '23 22 * * *' # UTC 22:23 = 台灣 06:23
  workflow_dispatch:

# v2.33.66 round 16 HIGH-1: minimal default permissions
permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      # v2.33.66 round 16 LOW-1: pin SHA
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - run: npm ci

      - name: Set report date
        run: echo "REPORT_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Generate report
        run: node scripts/daily-report.js
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SITE_URL: 'https://trip-planner-dby.pages.dev'
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # checkLinks() 打 /api/trips + /days 需要 mint token。少了這兩個，
          # getTriplineToken 會在 get-tripline-token.js:87 直接拋 —— 這個檢查
          # 從 v2.33.50 導入至今在 CI 裡一天都沒跑成過，只是舊 code 把失敗
          # 吞成 [] 再 render 成綠色「全部連結正常」，所以沒人發現。
          TRIPLINE_API_CLIENT_ID: ${{ secrets.TRIPLINE_API_CLIENT_ID }}
          TRIPLINE_API_CLIENT_SECRET: ${{ secrets.TRIPLINE_API_CLIENT_SECRET }}

      # v2.33.66 round 16 HIGH-2: pin SHA — community-maintained action, supply
      # chain compromise = leak GMAIL_APP_PASSWORD + CF token in earlier step env.
      - name: Send email via Gmail SMTP
        uses: dawidd6/action-send-mail@2cea9617b09d79a095af21254fbcb7ae95903dde # v3.12.0
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: Tripline 日報 — ${{ env.REPORT_DATE }}
          to: ${{ secrets.GMAIL_USERNAME }}
          from: ${{ secrets.GMAIL_USERNAME }}
          html_body: file://report.html
