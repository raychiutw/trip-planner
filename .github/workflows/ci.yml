name: CI
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (frontend)
        run: npx tsc --noEmit

      - name: TypeScript check (functions)
        run: npx tsc --noEmit -p tsconfig.functions.json

      - name: Unit tests
        run: npm test

      - name: API tests
        run: npm run test:api

      - name: Build
        run: npm run build

      - name: Verify Service Worker
        run: node scripts/verify-sw.js

      - name: Bundle size gate (B-P6 task 11.3 / 6.4)
        run: bash scripts/bundle-size-check.sh
        env:
          THRESHOLD_KB: 300

      - name: Install Playwright browsers
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install --with-deps chromium webkit
          fi

      - name: Playwright E2E (PR Chrome / main full matrix)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx playwright test --project=chromium
          else
            npx playwright test
          fi
