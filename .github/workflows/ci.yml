name: CI
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# v2.33.66 round 16 HIGH-1: minimal default permissions; supply-chain compromise
# under npm ci / npm test 拿不到 RW GITHUB_TOKEN。CI 純讀 repo + 跑 test，無寫需求。
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # v2.33.66 round 16 LOW-1: pin SHA + version comment (per OpenSSF Scorecard)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (frontend)
        run: npx tsc --noEmit

      - name: TypeScript check (functions)
        run: npx tsc --noEmit -p tsconfig.functions.json

      - name: Unit tests
        run: npm test

      - name: API tests
        run: npm run test:api

      - name: Build
        run: npm run build

      - name: Verify Service Worker
        run: node scripts/verify-sw.js

      - name: Bundle size gate (B-P6 task 11.3 / 6.4)
        run: bash scripts/bundle-size-check.sh
        env:
          THRESHOLD_KB: 300

      - name: Install Playwright browsers
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install --with-deps chromium webkit
          fi

      - name: Playwright E2E (PR Chrome / main full matrix)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx playwright test --project=chromium
          else
            npx playwright test
          fi
